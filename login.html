<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
    <title>Login</title>
</head>

<body>
    <div class="w-full h-screen flex justify-center items-center">
        <div class="w-[30vw] h-[80vh] bg-purple-900 text-white flex flex-col justify-center items-center rounded-lg ">
            <h1 class="text-4xl mb-5">Welcome</h1>
            <input id="email" type="email" placeholder="Enter your email address"
                class="bg-white text-black w-[350px] my-2 py-1 pl-2 rounded-md">

            <input id="password" type="password" placeholder="Password"
                class="bg-white text-black w-[350px] my-2 py-1 pl-2 rounded-md">

            <button id="loginBtn"
                class="btn bg-white text-black px-4 py-1.5 rounded-md border-none cursor-pointer w-[350px] my-2">
                Log in
            </button>
            <div><a href="#">Forgotten password?</a></div>
            <div class="dash flex justify-center items-center my-5">
                <div class="line1 h-[1px] w-[120px] bg-gray-400"></div>
                <div class="para mx-2">OR</div>
                <div class="line2 h-[1px] w-[120px] bg-gray-400"></div>
            </div>
            <div class="icons flex justify-center gap-7">
                <a href=""><img src="./images/google.png" alt="#" class="h-10"></a>
                <a href=""><img src="./images/facebook.png" alt="#" class="h-10"></a>
                <a href=""><img src="./images/apple.png" alt="#" class="h-10"></a>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>

</html>
